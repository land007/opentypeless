name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.14)'
        required: true
        default: 'v0.1.14'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: '--bundles deb appimage'
          # ARM64 build using GitHub's free ARM64 runner (public repos only)
          - platform: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            args: '--bundles deb appimage'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Sync version from tag
        shell: bash
        run: |
          TAG_VERSION="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG_VERSION#v}"
          echo "Syncing version: $VERSION"

          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));p.version='$VERSION';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"

          node -e "const fs=require('fs');const c=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8'));c.version='$VERSION';fs.writeFileSync('src-tauri/tauri.conf.json',JSON.stringify(c,null,2)+'\n');"

          node -e "const fs=require('fs');let c=fs.readFileSync('src-tauri/Cargo.toml','utf8');c=c.replace(/^version = \".*\"/m,'version = \"$VERSION\"');fs.writeFileSync('src-tauri/Cargo.toml',c);"

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl wget file pkg-config libssl-dev
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev libxdo-dev
          sudo apt-get install -y xdg-utils desktop-file-utils
          sudo apt-get install -y libfuse2 || sudo apt-get install -y libfuse2t64

      - name: Verify Linux ARM64 runner
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        shell: bash
        run: |
          ARCH="$(uname -m)"
          echo "Runner architecture: $ARCH"
          if [ "$ARCH" != "aarch64" ] && [ "$ARCH" != "arm64" ]; then
            echo "Linux ARM64 release builds must run on an ARM64 runner to avoid pkg-config cross-compilation failures."
            exit 1
          fi

      - name: Verify Linux native dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        shell: bash
        run: |
          pkg-config --modversion glib-2.0
          pkg-config --modversion gtk+-3.0
          pkg-config --modversion webkit2gtk-4.1
          pkg-config --modversion appindicator3-0.1
          # libxdo-dev does not ship a pkg-config file on Ubuntu; verify the headers/library directly
          test -f /usr/include/xdo.h
          ldconfig -p | grep -q libxdo.so

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: npm ci

      - name: Build with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: 'OpenTypeless ${{ github.event.inputs.tag || github.ref_name }}'
          releaseBody: 'See the assets below to download and install.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
